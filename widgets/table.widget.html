<!--
  table.widget.html — v5.3, `table` shape
  Pre-built widget for the `table` decisionData shape
  (feature-prioritizer, competitive-analyst, prd-author manifest).

  ORCHESTRATOR USE (see orchestrator.md § Decision Data Rendering → Widget render):
    Read this file → replace ONLY the `<script id="table-data">` island with the
    agent's decisionData mapped to its schema → pass the whole string as
    show_widget's widget_code. Everything else is constant. Markdown is the
    fallback when no inline-widget tool is available.

  Cell extras (all optional): { "pill": "in"|"out" } renders an MVP pill;
  { "delta": "up"|"down" } prefixes ↑/↓; otherwise the cell prints `text`.
-->
<div style="padding: 1rem 0;">
<h2 class="sr-only" id="tw-summary">Stop Gate scoring table with per-row deltas and MVP calls, plus approve, revise, and pivot actions.</h2>

<div style="display:flex; align-items:center; gap:10px; margin-bottom:14px;">
  <div style="width:32px; height:32px; border-radius:50%; background:var(--color-background-info); display:flex; align-items:center; justify-content:center; color:var(--color-text-info);"><i class="ti ti-table" style="font-size:18px;" aria-hidden="true"></i></div>
  <div>
    <p style="margin:0; font-size:15px; font-weight:500;" id="tw-agent">agent · Stop Gate</p>
    <p style="margin:0; font-size:13px; color:var(--color-text-secondary);" id="tw-phase">ready for your call</p>
  </div>
</div>

<p style="margin:0 0 8px; font-size:13px; color:var(--color-text-secondary);" id="tw-label"></p>
<div style="overflow-x:auto;">
  <table id="tw-table" style="width:100%; border-collapse:collapse; font-size:13px; table-layout:fixed;"></table>
</div>

<div style="margin-top:16px; padding-top:14px; border-top:0.5px solid var(--color-border-tertiary); display:flex; gap:8px; flex-wrap:wrap;">
  <button onclick="sendPrompt('y')">Approve &amp; continue ↗</button>
  <button id="tw-revise">Revise ↗</button>
  <button id="tw-pivot">Pivot ↗</button>
</div>
</div>

<script id="table-data" type="application/json">
{
  "agent": "feature-prioritizer",
  "phaseLabel": "Phase 7 of 15 · ready for your call",
  "label": "Re-scored backlog · top 6 with deltas + MVP call",
  "revisePrompt": "revise the prioritization",
  "pivotPrompt": "pivot the prioritization criteria",
  "cols": [
    { "label": "Feature" },
    { "label": "Reach", "num": true },
    { "label": "Impact", "num": true },
    { "label": "Effort", "num": true },
    { "label": "RICE", "num": true },
    { "label": "MVP" }
  ],
  "rows": [
    { "cells": [ { "text": "Guest checkout", "delta": "up" }, { "text": "9", "num": true }, { "text": "8", "num": true }, { "text": "3", "num": true }, { "text": "24.0", "num": true }, { "pill": "in" } ] },
    { "cells": [ { "text": "Saved carts" }, { "text": "7", "num": true }, { "text": "7", "num": true }, { "text": "4", "num": true }, { "text": "12.3", "num": true }, { "pill": "in" } ] },
    { "cells": [ { "text": "Price transparency" }, { "text": "8", "num": true }, { "text": "6", "num": true }, { "text": "5", "num": true }, { "text": "9.6", "num": true }, { "pill": "in" } ] },
    { "cells": [ { "text": "Loyalty tier", "delta": "down" }, { "text": "5", "num": true }, { "text": "5", "num": true }, { "text": "8", "num": true }, { "text": "3.1", "num": true }, { "pill": "out" } ] },
    { "cells": [ { "text": "Social login" }, { "text": "6", "num": true }, { "text": "4", "num": true }, { "text": "6", "num": true }, { "text": "4.0", "num": true }, { "pill": "out" } ] },
    { "cells": [ { "text": "Wishlist sharing" }, { "text": "4", "num": true }, { "text": "3", "num": true }, { "text": "7", "num": true }, { "text": "1.7", "num": true }, { "pill": "out" } ] }
  ]
}
</script>
<script>
(function () {
  var data = JSON.parse(document.getElementById('table-data').textContent);
  var esc = function (s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  };

  document.getElementById('tw-agent').textContent = data.agent + ' · Stop Gate';
  document.getElementById('tw-phase').textContent = data.phaseLabel || 'ready for your call';
  document.getElementById('tw-label').textContent = data.label || '';
  document.getElementById('tw-revise').onclick = function () { sendPrompt(data.revisePrompt || 'revise'); };
  document.getElementById('tw-pivot').onclick = function () { sendPrompt(data.pivotPrompt || 'pivot'); };

  var cols = data.cols || [];
  var head = '<thead><tr>' + cols.map(function (c) {
    var align = c.num ? 'right' : 'left';
    return '<th style="text-align:' + align + '; padding:8px 10px; border-bottom:0.5px solid var(--color-border-secondary); color:var(--color-text-secondary); font-weight:500;">' + esc(c.label) + '</th>';
  }).join('') + '</tr></thead>';

  var pill = function (kind) {
    var inP = kind === 'in';
    var bg = inP ? 'var(--color-background-success)' : 'var(--color-background-secondary)';
    var fg = inP ? 'var(--color-text-success)' : 'var(--color-text-secondary)';
    return '<span style="font-size:12px; padding:2px 10px; border-radius:var(--border-radius-md); background:' + bg + '; color:' + fg + ';">' + (inP ? 'in' : 'out') + '</span>';
  };
  var delta = function (dir) {
    if (dir === 'up') return '<span style="color:var(--color-text-success); margin-right:4px;">↑</span>';
    if (dir === 'down') return '<span style="color:var(--color-text-danger); margin-right:4px;">↓</span>';
    return '';
  };

  var body = '<tbody>' + (data.rows || []).map(function (r) {
    return '<tr>' + (r.cells || []).map(function (cell, i) {
      var col = cols[i] || {};
      var align = col.num ? 'right' : 'left';
      var content = cell.pill ? pill(cell.pill) : (delta(cell.delta) + esc(cell.text));
      return '<td style="text-align:' + align + '; padding:8px 10px; border-bottom:0.5px solid var(--color-border-tertiary);">' + content + '</td>';
    }).join('') + '</tr>';
  }).join('') + '</tbody>';

  document.getElementById('tw-table').innerHTML = head + body;
})();
</script>
